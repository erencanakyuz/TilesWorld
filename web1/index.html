<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity UI Tester</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components/main-menu.css">
    <link rel="stylesheet" href="css/components/world-tour.css">
    <link rel="stylesheet" href="css/components/shop.css">
    <link rel="stylesheet" href="css/components/customization.css">
    <link rel="stylesheet" href="css/components/leaderboard.css">
    <link rel="stylesheet" href="css/components/hud.css">
    <link rel="stylesheet" href="css/components/level-complete.css">
    <link rel="stylesheet" href="css/components/settings.css">
</head>

<body>
    <div id="app-container">
        <!-- Header -->
        <div class="header-section">
            <div class="game-logo">
                <div class="logo-icon">🎹</div>
                <div class="game-title">Unity UI Tester</div>
                <div class="game-subtitle">Piano Tiles UI Components</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Components Grid -->
            <div class="components-section">
                <h2 class="section-title">🎮 UI Components to Test</h2>
                <div id="componentsGrid" class="components-grid">
                    <!-- Component cards will be injected by JavaScript -->
                </div>
            </div>

            <!-- Unity Tips Section -->
            <div class="unity-tips-section">
                <div id="unityTips" class="unity-tips">
                    <!-- Unity tips will be injected by JavaScript -->
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-section">
                <button class="btn btn-primary" onclick="UITester.testAll()">
                    🚀 Test All Components
                </button>
                <button class="btn btn-danger" onclick="UITester.resetTests()">
                    🔄 Reset Tests
                </button>
            </div>
        </div>

        <!-- Bottom Navigation Carousel -->
        <div class="bottom-navigation">
            <div class="nav-header">
                <h3>🎮 Quick Component Navigation</h3>
                <div class="nav-controls">
                    <button class="nav-btn prev-btn" onclick="UITester.navigatePrev()" title="Previous Component (←)">
                        ← Prev
                    </button>
                    <span class="nav-indicator">
                        <span id="currentComponentIndex">1</span> / <span id="totalComponents">8</span>
                    </span>
                    <button class="nav-btn next-btn" onclick="UITester.navigateNext()" title="Next Component (→)">
                        Next →
                    </button>
                </div>
            </div>
            
            <div class="component-carousel">
                <div class="carousel-container" id="componentCarousel">
                    <!-- Component thumbnails will be injected here -->
                </div>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="previewModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="previewTitle">Component Preview</h2>
                    <button class="close-btn" onclick="UITester.closePreview()">&times;</button>
                    <div class="modal-nav-controls">
                        <button class="modal-nav-btn" onclick="UITester.navigatePrevInModal()" title="Previous (←)">←</button>
                        <button class="modal-nav-btn" onclick="UITester.navigateNextInModal()" title="Next (→)">→</button>
                    </div>
                </div>
                <div class="modal-body">
                    <div id="previewContent">
                        <!-- Preview content will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils/constants.js"></script>
    <script src="data/mockups.js"></script>
    <script src="data/component-data.js"></script>
    <script src="data/analysis-data.js"></script>
    <script src="js/core/preview-manager.js"></script>
    <script src="js/core/modal-handler.js"></script>
    <script src="js/core/interaction-handler.js"></script>
    <script src="js/core/progress-tracker.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
